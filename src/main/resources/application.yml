# server 설정
server:
  port: 8080

spring:
  application:
    name: test-project
  # 파일 업로드 설정
  servlet:
    multipart:
      enabled: true # MultipartFile 업로드 활성화
      max-file-size: 10MB
      max-request-size: 10MB

  # MySQL 접속 설정
  datasource:
    url: jdbc:mysql://192.168.45.32:3306/test-db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: testuser
    password: testuser
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000       # 10분
      max-lifetime: 1800000      # 30분
      connection-timeout: 30000  # 30초
      keepalive-time: 300000     # 5분마다 ping

# MyBatis 맵퍼 설정
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: org.example.domain
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true # 카멜케이스 자동 매핑

custom-file:
  base-path: C:/data/uploads/
  temp-path: C:/tmp/uploads/